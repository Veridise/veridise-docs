apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
      listen            8080;
      server_name       localhost;
      absolute_redirect off;

      location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/index.html $uri/ =404;
      }
    }
