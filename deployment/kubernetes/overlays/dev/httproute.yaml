apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: saas-docs
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "docs.veridise.tools"
    external-dns.alpha.kubernetes.io/ttl: "120"
spec:
  parentRefs:
    - name: gateway-external
      namespace: gateway-api
      sectionName: https-veridise-tools
  hostnames:
    - docs.veridise.tools
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: saas-docs
          port: 80
