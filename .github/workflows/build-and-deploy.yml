name: Deploy dev
on:
  push:
    branches: 
      - main
      - 'v[0-9].[0-9]+.[0-9]+-pre-release'
      - sas-369-production-deployment


env: 
  IMAGE_TAG: git-latest
  DEPLOY_ENV: dev
  
jobs:
  docker-build:
    runs-on: ["self-hosted", "kubernetes", "dev"]
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm
      
      - name: Setup docker tag for production
        if: ${{ github.ref_name == 'sas-369-production-deployment' }}
        run: |
            echo "IMAGE_TAG=production" >> $GITHUB_ENV
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV

      - name: Build docker image
        run: docker build -t veridise/docs:${{ github.sha }} -t veridise/docs:${{ env.IMAGE_TAG }} .

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.SAAS_DOCKERHUB_USERNAME }}
          password: ${{ secrets.SAAS_DOCKERHUB_TOKEN }}

      - name: Push new image tags to DockerHub
        run: docker push veridise/docs:${{ github.sha }} &&
            docker push veridise/docs:${{ env.IMAGE_TAG }}

  call-deploy-workflow:
    needs: docker-build
    uses: ./.github/workflows/k8s-deploy.yml
    with:
        environment: ${{ env.DEPLOY_ENV }}
     