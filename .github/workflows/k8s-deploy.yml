name: Deploy dev
on:
  push:
    branches: 
      - main
      - 'v[0-9].[0-9]+.[0-9]+-pre-release'

env: 
  IMAGE_TAG: git-latest
  
jobs:
  docker-build:
    runs-on: ["self-hosted", "kubernetes", "dev"]
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm
      
      - name: Build docker image
        run: docker build -t veridise/docs:${{ github.sha }} -t veridise/docs:${{ env.IMAGE_TAG }} .

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.SAAS_DOCKERHUB_USERNAME }}
          password: ${{ secrets.SAAS_DOCKERHUB_TOKEN }}

      - name: Push new image tags to DockerHub
        run: docker push veridise/docs:${{ github.sha }} &&
            docker push veridise/docs:${{ env.IMAGE_TAG }}

  deploy-dev:
    runs-on: ["self-hosted", "kubernetes", "dev"]
    needs: docker-build
    timeout-minutes: 10
    
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3.1

      - name: Deploy
        run: kubectl apply -k deployment/kubernetes/overlays/dev/ &&
          kubectl rollout restart deployment saas-docs -n saas-docs
