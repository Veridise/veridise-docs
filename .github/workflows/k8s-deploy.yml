name: Deploy dev
on:
  push:
    branches: 
      - main
      - sas-191-dev-deployment

env: 
  IMAGE_TAG: git-latest
  
jobs:
  docker-build:
    runs-on: ["self-hosted", "kubernetes", "dev"]
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.SAAS_DOCKERHUB_USERNAME }}
          password: ${{ secrets.SAAS_DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: veridise/docs:${{ github.sha }}, veridise/docs:${{ env.IMAGE_TAG }}

  deploy-dev:
    runs-on: ["self-hosted", "kubernetes", "dev"]
    needs: docker-build
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v3
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3.1

      - name: Deploy
        uses: kubectl apply -k deployment/kubernetes/overlays/dev/

        