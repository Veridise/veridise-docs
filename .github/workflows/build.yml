name: Test Build
on:
  push:
    branches-ignore:    
      - main
    paths-ignore:
      - "deployment/**"
      - ".github/**"

jobs:
  build:
    runs-on: ["dev"]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format-check
      - name: Build website
        run: npm run build
