name: Test Build
on:
  push:
    branches-ignore:    
      - main

jobs:
  build:
    runs-on: ["self-hosted", "kubernetes", "dev"]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build website
        run: npm run build